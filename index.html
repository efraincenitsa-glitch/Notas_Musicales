<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piano IA Detector</title>

<link rel="apple-touch-icon" href="icono.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>

<style>
  body{
    font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto;
    background:#0f172a;
    color:white;
    text-align:center;
    padding: 10px 14px 40px;
  }
  h2{ margin-top:8px }
  #nota{
    font-size:48px;
    color:#22c55e;
    margin: 10px 0 6px;
    min-height: 1.2em;
  }
  #controles{
    display:flex; gap:10px; justify-content:center; flex-wrap: wrap; margin: 10px 0 8px;
  }
  select, button{
    padding:12px 16px;
    font-size:16px;
    border-radius:8px;
    border:none;
    background:#334155;
    color: #fff;
    cursor:pointer;
  }
  button.primary{ background:#2563eb }
  button.danger{ background:#ef4444 }
  button.secondary{ background:#475569 }
  button:disabled{ opacity:.5; cursor:not-allowed }
  #resumen{
    margin-top:16px;
    background:#1e293b;
    padding:14px;
    border-radius:10px;
    max-width:520px;
    margin-left:auto;
    margin-right:auto;
    text-align:left;
  }
  #chips { display:flex; flex-wrap: wrap; gap:8px; margin-top:8px }
  .chip{
    padding:6px 10px; background:#0ea5e9; color:#081018; border-radius:9999px; font-weight:600;
  }
  #pista{
    font-size: 14px; color:#94a3b8; margin-top:4px;
  }
</style>
</head>

<body>

<h2>🎹 Detector IA de Notas</h2>

<div id="controles">
  <select id="instrumento" title="Instrumento">
    <option value="guitarra" selected>Guitarra (♯)</option>
    <option value="bajo">Bajo (♯)</option>
    <option value="piano">Piano (♭)</option>
  </select>

  <button id="btnStart" class="primary" onclick="iniciar()">Activar micrófono</button>
  <button id="btnStop" class="danger" onclick="detener()" disabled>Detener micrófono</button>
  <button id="btnLimpiar" class="secondary" onclick="limpiarResumen()">Limpiar</button>
</div>

<div id="nota">—</div>
<div id="pista">Consejo: habla o canta una única nota sostenida para estabilizar la detección.</div>

<div id="resumen">
  <div><strong>Resumen (notas únicas detectadas)</strong></div>
  <div id="chips"></div>
</div>

<script>
/* ------------------ Configuración ------------------ */
const notasBase = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const SHARP_TO_FLAT = { "C#":"Db","D#":"Eb","F#":"Gb","G#":"Ab","A#":"Bb" };
const MAX_RESUMEN = 5;   // cambia este valor si quieres más/menos notas en el resumen

/* ------------------ Estado global ------------------ */
let audioContext = null;
let analyser = null;
let micStream = null;
let rafId = null;

let lastNote = null;              // última nota mostrada (para no repetir)
const conteoNotas = {};           // { "C": 12, "D": 3, ... }
const setUnicas = new Set();      // Notas únicas para el resumen

/* ------------------ UI helpers ------------------ */
const $ = (sel) => document.querySelector(sel);
const $nota = $("#nota");
const $chips = $("#chips");
const $btnStart = $("#btnStart");
const $btnStop = $("#btnStop");
const $instrumento = $("#instrumento");

/* ------------------ Flujo principal ------------------ */
async function iniciar(){
  try{
    if(audioContext && audioContext.state === "suspended") await audioContext.resume();

    if(!audioContext){
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    // Pedir acceso al micrófono
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mic = audioContext.createMediaStreamSource(micStream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;

    mic.connect(analyser);

    $btnStart.disabled = true;
    $btnStop.disabled = false;

    loopDeteccion(); // Inicia el bucle de análisis
  }catch(err){
    console.error(err);
    alert("No se pudo acceder al micrófono. Verifica permisos del navegador.");
  }
}

function detener(){
  try{
    if(rafId) cancelAnimationFrame(rafId);
    rafId = null;

    if(micStream){
      micStream.getTracks().forEach(t => t.stop());
      micStream = null;
    }
    if(audioContext){
      // Cerrar/pausar el contexto
      audioContext.close();
      audioContext = null;
    }
  }finally{
    $btnStart.disabled = false;
    $btnStop.disabled = true;
  }
}

function limpiarResumen(){
  Object.keys(conteoNotas).forEach(k => delete conteoNotas[k]);
  setUnicas.clear();
  lastNote = null;
  $nota.textContent = "—";
  renderResumen();
}

/* ------------------ Detección de pitch ------------------ */
function loopDeteccion(){
  if(!analyser || !audioContext) return;

  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  const freq = autoCorrelate(buffer, audioContext.sampleRate);
  if(freq !== -1 && Number.isFinite(freq)){
    const nombreBase = frecuenciaANota(freq);           // C, C#, D...
    const notaFormateada = formatearNota(nombreBase);   // según instrumento
    mostrarNota(notaFormateada);
  }
  rafId = requestAnimationFrame(loopDeteccion);
}

/* Convertir frecuencia a nombre de nota (sin octava) */
function frecuenciaANota(freq){
  const A4 = 440;
  const n = 12 * Math.log2(freq / A4);
  const index = Math.round(n) + 57; // 57 = índice de A4 si C=0, B=11
  return notasBase[(index % 12 + 12) % 12];
}

/* Dar formato a la nota según instrumento elegido */
function formatearNota(nota){
  const inst = $instrumento.value; // guitarra | bajo | piano
  if(inst === "piano"){
    // preferir bemoles en el piano
    return SHARP_TO_FLAT[nota] || nota;
  }
  // guitarra/bajo: preferir sostenidos
  // (si viene en bemol por alguna razón, lo devolvemos a sostenido)
  const flatToSharp = { "Db":"C#", "Eb":"D#", "Gb":"F#", "Ab":"G#", "Bb":"A#" };
  return flatToSharp[nota] || nota;
}

/* Mostrar nota actual y actualizar resumen único */
function mostrarNota(nota){
  if(nota === lastNote) return; // evita demasiados rebotes
  lastNote = nota;

  $nota.textContent = nota;

  // Conteo y set de únicas
  conteoNotas[nota] = (conteoNotas[nota] || 0) + 1;
  setUnicas.add(nota);

  renderResumen();
}

/* Render del resumen (notas únicas más frecuentes) */
function renderResumen(){
  // Ordenar por frecuencia (desc) y luego alfabético
  const ordenadas = Array.from(setUnicas)
    .sort((a,b)=>{
      const da = conteoNotas[a] || 0;
      const db = conteoNotas[b] || 0;
      if(db !== da) return db - da;
      return a.localeCompare(b);
    });

  const toShow = ordenadas.slice(0, MAX_RESUMEN);

  $chips.innerHTML = "";
  toShow.forEach(n => {
    const span = document.createElement("span");
    span.className = "chip";
    span.textContent = n;
    $chips.appendChild(span);
  });
}

/* ------------------ Autocorrelación (pitch detection) ------------------ */
function autoCorrelate(buf, sampleRate){
  // Basado en autocorrelación simplificada
  let SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i]*buf[i];
  rms = Math.sqrt(rms/SIZE);
  if (rms < 0.01) return -1; // señal muy débil

  let r1 = 0, r2 = SIZE - 1, thresh = 0.2;
  for (let i = 0; i < SIZE/2; i++){
    if (Math.abs(buf[i]) < thresh){ r1 = i; break; }
  }
  for (let i = 1; i < SIZE/2; i++){
    if (Math.abs(buf[SIZE - i]) < thresh){ r2 = SIZE - i; break; }
  }

  buf = buf.slice(r1, r2);
  SIZE = buf.length;

  const c = new Array(SIZE).fill(0);
  for (let i = 0; i < SIZE; i++){
    for (let j = 0; j < SIZE - i; j++){
      c[i] += buf[j] * buf[j + i];
    }
  }

  let d = 0;
  while (c[d] > c[d+1]) d++;
  let maxval = -1, maxpos = -1;
  for (let i = d; i < SIZE; i++){
    if (c[i] > maxval){ maxval = c[i]; maxpos = i; }
  }
  const T0 = maxpos;
  if (T0 <= 0) return -1;

  return sampleRate / T0;
}
</script>
</body>
</html>
