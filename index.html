<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Detector IA de Notas</title>

<script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>

<style>
:root{
  --bg:#0f172a; --panel:#1e293b; --txt:#e2e8f0; --muted:#94a3b8;
  --primary:#2563eb; --danger:#ef4444; --chip:#0ea5e9; --note:#22c55e;
}
body{font-family:Arial;background:var(--bg);color:var(--txt);text-align:center;padding:15px}
button{padding:10px;border-radius:10px;border:none;color:white;cursor:pointer;margin:5px}
.primary{background:var(--primary)} .danger{background:var(--danger)} .secondary{background:#475569}
#notaActual{font-size:50px;color:var(--note)}
#resumen,#analisis,#listaCanciones{
  background:var(--panel);padding:15px;margin-top:15px;border-radius:12px;max-width:700px;margin-left:auto;margin-right:auto;text-align:left;
}
.chip{background:var(--chip);padding:5px 10px;border-radius:20px;margin:3px;display:inline-block}
</style>
</head>

<body>

<h2>🎼 Detector IA de Notas</h2>

<button class="primary" onclick="iniciar()">Activar micrófono</button>
<button class="danger" onclick="detener()">Detener</button>
<button class="secondary" onclick="limpiar()">Limpiar</button>

<div id="notaActual">—</div>

<div id="resumen">
<h3>Notas detectadas</h3>
<div id="chips"></div>
</div>

<div id="analisis">
<h3>Análisis</h3>
<div>Nota principal: <span id="notaPrincipal">—</span></div>
<div>Intervalos: <span id="intervalos">—</span></div>
<div>Acordes: <span id="acordes">—</span></div>
</div>

<!-- GUARDAR -->
<div id="guardarCancion">
<h3>💾 Guardar canción</h3>
<input type="text" id="nombreCancion" placeholder="Nombre de la canción" style="padding:10px;border-radius:10px;border:none;width:90%;">
<br><br>
<button class="primary" onclick="guardarCancion()">Guardar</button>
</div>

<!-- LISTA -->
<div id="listaCanciones">
<h3>🎵 Canciones guardadas</h3>
<div id="contenidoCanciones"></div>
</div>

<script>
const PC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
const NOMBRES={"C":"Do","D":"Re","E":"Mi","F":"Fa","G":"Sol","A":"La","B":"Si",
"C#":"Do♯","D#":"Re♯","F#":"Fa♯","G#":"Sol♯","A#":"La♯"};

let audioContext, analyser, micStream;
let notasSet=new Set(), conteo={};

function iniciar(){
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
audioContext=new AudioContext();
analyser=audioContext.createAnalyser();
let mic=audioContext.createMediaStreamSource(stream);
mic.connect(analyser);
micStream=stream;
loop();
});
}

function detener(){
if(micStream) micStream.getTracks().forEach(t=>t.stop());
}

function limpiar(){
notasSet.clear();
conteo={};
render();
}

function loop(){
let buffer=new Float32Array(analyser.fftSize);
analyser.getFloatTimeDomainData(buffer);
let freq=autoCorrelate(buffer,audioContext.sampleRate);
if(freq!=-1){
let nota=frecuenciaANota(freq);
notasSet.add(nota);
conteo[nota]=(conteo[nota]||0)+1;
document.getElementById("notaActual").textContent=NOMBRES[nota];
render();
}
requestAnimationFrame(loop);
}

function frecuenciaANota(freq){
let A4=440;
let n=12*Math.log2(freq/A4);
let index=Math.round(n)+57;
return PC[(index%12+12)%12];
}

function render(){
let chips=document.getElementById("chips");
chips.innerHTML="";
notasSet.forEach(n=>{
chips.innerHTML+=`<span class="chip">${NOMBRES[n]}</span>`;
});
analizar();
}

function analizar(){
let principal=null,max=0;
for(let n in conteo){
if(conteo[n]>max){max=conteo[n];principal=n;}
}
document.getElementById("notaPrincipal").textContent=principal?NOMBRES[principal]:"—";

let intervalos=[];
notasSet.forEach(n=>{
if(n!==principal){
intervalos.push(n);
}
});
document.getElementById("intervalos").textContent=intervalos.map(n=>NOMBRES[n]).join(" - ")||"—";

let acordes=Tonal.Chord.detect(Array.from(notasSet));
document.getElementById("acordes").textContent=acordes.join(" - ")||"—";
}

/* ===== GUARDAR ===== */

function guardarCancion(){
let nombre=document.getElementById("nombreCancion").value.trim();
if(!nombre){alert("Escribe nombre");return;}
if(notasSet.size===0){alert("No hay notas");return;}

let notas=Array.from(notasSet).map(n=>NOMBRES[n]);

let canciones=JSON.parse(localStorage.getItem("canciones"))||[];

canciones.push({nombre,notas});

localStorage.setItem("canciones",JSON.stringify(canciones));

document.getElementById("nombreCancion").value="";
mostrarCanciones();
}

function mostrarCanciones(){
let canciones=JSON.parse(localStorage.getItem("canciones"))||[];
let cont=document.getElementById("contenidoCanciones");
cont.innerHTML="";

canciones.slice().reverse().forEach(c=>{
cont.innerHTML+=`
<div>
<strong>${c.nombre}</strong><br>
Notas: ${c.notas.join(" - ")}
<hr>
</div>
`;
});
}

mostrarCanciones();

/* ===== DETECTOR ===== */

function autoCorrelate(buf,sampleRate){
let SIZE=buf.length;
let rms=0;
for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
rms=Math.sqrt(rms/SIZE);
if(rms<0.01) return -1;

let c=new Array(SIZE).fill(0);
for(let i=0;i<SIZE;i++){
for(let j=0;j<SIZE-i;j++){
c[i]+=buf[j]*buf[j+i];
}
}

let max=0,pos=0;
for(let i=0;i<SIZE;i++){
if(c[i]>max){max=c[i];pos=i;}
}

if(pos==0) return -1;
return sampleRate/pos;
}
</script>

</body>
</html>
