<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Detector IA PRO EXPERTO</title>

<script src="https://unpkg.com/@tonaljs/tonal"></script>

<style>
:root{
  --bg:#0f172a; --panel:#1e293b; --txt:#e2e8f0;
  --primary:#2563eb; --danger:#ef4444; --ok:#22c55e;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--txt);
text-align:center;
padding:15px
}

button{
padding:10px;
border-radius:10px;
border:none;
color:white;
cursor:pointer;
margin:5px
}

.primary{background:var(--primary)}
.danger{background:var(--danger)}
.ok{background:var(--ok)}

select,input{
padding:10px;
border-radius:10px;
margin-top:10px;
border:none
}

.panel{
background:var(--panel);
padding:15px;
margin-top:15px;
border-radius:12px;
max-width:700px;
margin:auto;
text-align:left;
}

#notaActual{
font-size:55px;
color:#22c55e;
text-align:center;
}

.item{
background:#334155;
padding:10px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>🎼 Detector IA PRO EXPERTO</h2>

<button class="primary" onclick="iniciar()">🎤 Activar</button>
<button class="danger" onclick="detener()">⛔ Detener</button>
<button onclick="limpiar()">🧹 Limpiar</button>

<h3>🎸 Instrumento</h3>
<select id="instrumento">
<option value="guitarra">Guitarra</option>
<option value="bajo">Bajo</option>
<option value="teclado">Teclado</option>
</select>

<div id="notaActual">—</div>

<div class="panel">
<h3>Notas detectadas</h3>
<div id="chips"></div>
</div>

<div class="panel">
<h3>Análisis</h3>
<div>Nota principal: <span id="notaPrincipal">—</span></div>
<div>Acordes: <span id="acordes">—</span></div>
</div>

<div class="panel">
<h3>💾 Guardar canción</h3>

<input type="text" id="nombreCancion" placeholder="Nombre">

<br>

<button class="primary" onclick="guardarCancion()">Guardar</button>
<button class="ok" onclick="descargar()">Descargar</button>

<input type="file" onchange="importar(event)">
</div>

<div class="panel">
<h3>🎵 Canciones</h3>
<div id="lista"></div>
</div>

<script>
const PC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

let audioContext, analyser, micStream;
let notasSet=new Set(), conteo={};
let historial=[];

/* 🎸 RANGO */
function getRango(){
let i=document.getElementById("instrumento").value;
if(i==="bajo") return {min:40,max:400};
if(i==="teclado") return {min:30,max:2000};
return {min:80,max:1000};
}

/* 🎤 AUDIO */
async function iniciar(){
try{

audioContext = new (window.AudioContext || window.webkitAudioContext)();

if(audioContext.state === "suspended"){
await audioContext.resume();
}

let stream = await navigator.mediaDevices.getUserMedia({audio:true});

analyser = audioContext.createAnalyser();
analyser.fftSize = 2048;

let mic = audioContext.createMediaStreamSource(stream);
mic.connect(analyser);

micStream = stream;

loop();

}catch(e){
alert("Error micrófono: " + e.message);
}
}

function detener(){
if(micStream) micStream.getTracks().forEach(t=>t.stop());
}

/* 🔁 LOOP CORREGIDO */
function loop(){

if(!analyser || !audioContext){
requestAnimationFrame(loop);
return;
}

let buffer = new Float32Array(analyser.fftSize);
analyser.getFloatTimeDomainData(buffer);

let freq = autoCorrelate(buffer, audioContext.sampleRate);

if(freq === -1 || isNaN(freq)){
requestAnimationFrame(loop);
return;
}

let r = getRango();

/* 🔥 SUAVIZADO */
historial.push(freq);
if(historial.length > 5) historial.shift();

let promedio = historial.reduce((a,b)=>a+b,0) / historial.length;

if(promedio > r.min && promedio < r.max){

let nota = frecuenciaANota(promedio);

notasSet.add(nota);
conteo[nota] = (conteo[nota] || 0) + 1;

document.getElementById("notaActual").innerText = nota;

render();
}

requestAnimationFrame(loop);
}

/* 🎼 FRECUENCIA */
function frecuenciaANota(f){
let n = 12*Math.log2(f/440);
let i = Math.round(n)+57;
return PC[(i%12+12)%12];
}

/* UI */
function render(){

document.getElementById("chips").innerText=[...notasSet].join(" - ");

let principal=null,max=0;

for(let n in conteo){
if(conteo[n]>max){max=conteo[n];principal=n;}
}

document.getElementById("notaPrincipal").innerText=principal||"—";

try{
let acordes=Tonal.Chord.detect([...notasSet]);
document.getElementById("acordes").innerText=acordes.join(", ");
}catch{}
}

/* LIMPIAR */
function limpiar(){
notasSet.clear();
conteo={};
historial=[];
render();
}

/* 💾 CRUD */
function guardarCancion(){

let nombre=document.getElementById("nombreCancion").value.trim();

if(!nombre || notasSet.size===0) return;

let data=getData();

data.push({
id:Date.now(),
nombre,
notas:[...notasSet],
fecha:new Date().toLocaleString()
});

localStorage.setItem("songs",JSON.stringify(data));

mostrar();
}

function getData(){
return JSON.parse(localStorage.getItem("songs"))||[];
}

function eliminar(id){
let data=getData().filter(x=>x.id!==id);
localStorage.setItem("songs",JSON.stringify(data));
mostrar();
}

function editar(id){
let data=getData();
let item=data.find(x=>x.id===id);

let nuevo=prompt("Nuevo nombre",item.nombre);
if(!nuevo) return;

item.nombre=nuevo;

localStorage.setItem("songs",JSON.stringify(data));
mostrar();
}

/* MOSTRAR */
function mostrar(){

let cont=document.getElementById("lista");
let data=getData();

cont.innerHTML="";

data.reverse().forEach(x=>{
cont.innerHTML+=`
<div class="item">
<strong>${x.nombre}</strong><br>
Notas: ${x.notas.join(" - ")}<br>
<small>${x.fecha}</small><br>

<button onclick="editar(${x.id})">✏️</button>
<button onclick="eliminar(${x.id})" class="danger">🗑️</button>
</div>
`;
});
}

mostrar();

/* 📥 EXPORTAR */
function descargar(){
let data=getData();

let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="canciones.json";
a.click();
}

/* 📂 IMPORTAR */
function importar(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(){
let data=JSON.parse(reader.result);
localStorage.setItem("songs",JSON.stringify(data));
mostrar();
};

reader.readAsText(file);
}

/* 🔬 DETECTOR */
function autoCorrelate(buf,sampleRate){
let SIZE=buf.length;
let rms=0;

for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
rms=Math.sqrt(rms/SIZE);

if(rms<0.02) return -1;

let best=0,pos=0;

for(let i=0;i<SIZE;i++){
let sum=0;
for(let j=0;j<SIZE-i;j++){
sum+=buf[j]*buf[j+i];
}
if(sum>best){best=sum;pos=i;}
}

if(pos===0) return -1;

return sampleRate/pos;
}
</script>

</body>
</html>
