<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Detector IA de Notas PRO</title>

<link rel="icon" type="image/png" sizes="1024x1024" href="icon-1024.png">
<link rel="apple-touch-icon" sizes="1024x1024" href="icon-1024.png">
<link rel="manifest" href="manifest.json">

<!-- TONAL CORREGIDO -->
<script src="https://unpkg.com/@tonaljs/tonal"></script>

<style>
:root{
  --bg:#0f172a; --panel:#1e293b; --txt:#e2e8f0;
  --primary:#2563eb; --danger:#ef4444; --chip:#0ea5e9; --note:#22c55e;
}
body{font-family:Arial;background:var(--bg);color:var(--txt);text-align:center;padding:15px}
button{padding:10px;border-radius:10px;border:none;color:white;cursor:pointer;margin:5px}
.primary{background:var(--primary)} .danger{background:var(--danger)} .secondary{background:#475569}
select{padding:10px;border-radius:10px;margin-top:10px}

#notaActual{font-size:50px;color:var(--note)}

#resumen,#analisis,#listaCanciones,#iaCancion,#escalaMusical{
  background:var(--panel);padding:15px;margin-top:15px;border-radius:12px;max-width:700px;margin:auto;text-align:left;
}
.chip{background:var(--chip);padding:5px 10px;border-radius:20px;margin:3px;display:inline-block}
</style>
</head>

<body>

<h2>🎼 Detector IA de Notas PRO</h2>

<button class="primary" onclick="iniciar()">Activar micrófono</button>
<button class="danger" onclick="detener()">Detener</button>
<button class="secondary" onclick="limpiar()">Limpiar</button>

<h3>🎸 Instrumento</h3>
<select id="instrumento">
<option value="guitarra">Guitarra</option>
<option value="bajo">Bajo</option>
<option value="teclado">Teclado</option>
</select>

<div id="notaActual">—</div>

<div id="resumen">
<h3>Notas detectadas</h3>
<div id="chips"></div>
</div>

<div id="analisis">
<h3>Análisis</h3>
<div>Nota principal: <span id="notaPrincipal">—</span></div>
<div>Intervalos: <span id="intervalos">—</span></div>
<div>Acordes: <span id="acordes">—</span></div>
</div>

<div id="iaCancion">
<h3>🧠 Detección automática</h3>
<div id="cancionDetectada">—</div>
</div>

<div id="escalaMusical">
<h3>🎼 Escala detectada</h3>
<div id="escalaDetectada">—</div>
</div>

<script>
const PC=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const NOMBRES={
"C":"DO","D":"RE","E":"MI","F":"FA","G":"SOL","A":"LA","B":"SI",
"C#":"DO♯","D#":"RE♯","F#":"FA♯","G#":"SOL♯","A#":"LA♯"
};

let audioContext, analyser, micStream;
let notasSet=new Set(), conteo={};
let historialFrecuencias=[];

/* 🎸 RANGO POR INSTRUMENTO */
function getRangoInstrumento(){
let inst = document.getElementById("instrumento").value;

if(inst==="bajo") return {min:40,max:400};
if(inst==="guitarra") return {min:80,max:1000};
if(inst==="teclado") return {min:30,max:2000};

return {min:80,max:1200};
}

/* 🎤 INICIAR MIC (VERSIÓN SEGURA) */
async function iniciar(){
try{

audioContext = new (window.AudioContext || window.webkitAudioContext)();

if(audioContext.state === "suspended"){
await audioContext.resume();
}

let stream = await navigator.mediaDevices.getUserMedia({audio:true});

analyser = audioContext.createAnalyser();
analyser.fftSize = 2048;

let mic = audioContext.createMediaStreamSource(stream);
mic.connect(analyser);

micStream = stream;

loop();

}catch(err){
alert("Error micrófono: " + err.message);
}
}

function detener(){
if(micStream) micStream.getTracks().forEach(t=>t.stop());
}

function limpiar(){
notasSet.clear();
conteo={};
historialFrecuencias=[];
render();
}

/* 🔁 LOOP */
function loop(){
if(!analyser) return;

let buffer=new Float32Array(analyser.fftSize);
analyser.getFloatTimeDomainData(buffer);

let freq=autoCorrelate(buffer,audioContext.sampleRate);

let rango = getRangoInstrumento();

if(freq > rango.min && freq < rango.max){

historialFrecuencias.push(freq);
if(historialFrecuencias.length > 5) historialFrecuencias.shift();

let promedio = historialFrecuencias.reduce((a,b)=>a+b,0)/historialFrecuencias.length;

let nota=frecuenciaANota(promedio);

notasSet.add(nota);
conteo[nota]=(conteo[nota]||0)+1;

document.getElementById("notaActual").textContent=NOMBRES[nota];

render();
detectarCancionIA();
detectarEscala();
}

requestAnimationFrame(loop);
}

/* 🎼 FRECUENCIA → NOTA */
function frecuenciaANota(freq){
let A4=440;
let n=12*Math.log2(freq/A4);
let index=Math.round(n)+57;
return PC[(index%12+12)%12];
}

/* 🎨 UI */
function render(){
let chips=document.getElementById("chips");
chips.innerHTML="";
notasSet.forEach(n=>{
chips.innerHTML+=`<span class="chip">${NOMBRES[n]}</span>`;
});
analizar();
}

/* 📊 ANÁLISIS */
function analizar(){
let principal=null,max=0;

for(let n in conteo){
if(conteo[n]>max){max=conteo[n];principal=n;}
}

document.getElementById("notaPrincipal").textContent=principal?NOMBRES[principal]:"—";

let intervalos=[];
notasSet.forEach(n=>{
if(n!==principal){intervalos.push(n);}
});

document.getElementById("intervalos").textContent=
intervalos.map(n=>NOMBRES[n]).join(" - ")||"—";

/* TONAL SEGURO */
try{
let acordes=Tonal.Chord.detect(Array.from(notasSet));
document.getElementById("acordes").textContent=acordes.join(" - ")||"—";
}catch(e){
document.getElementById("acordes").textContent="—";
}
}

/* 🤖 DETECCIÓN SIMPLE */
const BASE_CANCIONES=[
{nombre:"Cumpleaños Feliz", notas:["C","D","E"]},
{nombre:"Oda a la Alegría", notas:["E","F","G"]},
{nombre:"Let It Be", notas:["C","G","A","F"]},
{nombre:"Canon en D", notas:["D","A","B","F#","G"]}
];

function detectarCancionIA(){
let notasActuales=Array.from(notasSet);

let mejor=null,scoreMax=0;

BASE_CANCIONES.forEach(c=>{
let score=0;

c.notas.forEach(n=>{
if(notasActuales.includes(n)) score++;
});

if(score>scoreMax){
scoreMax=score;
mejor=c.nombre;
}
});

document.getElementById("cancionDetectada").textContent =
scoreMax>=3 ? "🎵 "+mejor : "Escuchando...";
}

/* 🎼 ESCALA */
function detectarEscala(){

let notas = Array.from(notasSet);

if(notas.length < 3){
document.getElementById("escalaDetectada").textContent = "Detectando...";
return;
}

let posibles=[];

PC.forEach(root=>{
try{
let mayor=Tonal.Scale.get(root+" major").notes;
let menor=Tonal.Scale.get(root+" minor").notes;

let sM=compararEscala(notas,mayor);
let sMen=compararEscala(notas,menor);

if(sM>0) posibles.push({n:NOMBRES[root]+" MAYOR",s:sM});
if(sMen>0) posibles.push({n:NOMBRES[root]+" MENOR",s:sMen});

}catch(e){}
});

posibles.sort((a,b)=>b.s-a.s);

document.getElementById("escalaDetectada").textContent =
(posibles.length>0 && posibles[0].s>=3)
? "🎼 "+posibles[0].n
: "No clara aún...";
}

function compararEscala(notas,escala){
let score=0;
notas.forEach(n=>{
if(escala.includes(n)) score++;
});
return score;
}

/* 🔬 DETECCIÓN FRECUENCIA */
function autoCorrelate(buf,sampleRate){
let SIZE=buf.length;
let rms=0;

for(let i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
rms=Math.sqrt(rms/SIZE);

if(rms<0.02) return -1;

let c=new Array(SIZE).fill(0);

for(let i=0;i<SIZE;i++){
for(let j=0;j<SIZE-i;j++){
c[i]+=buf[j]*buf[j+i];
}
}

let max=0,pos=0;

for(let i=0;i<SIZE;i++){
if(c[i]>max){max=c[i];pos=i;}
}

if(pos===0) return -1;

return sampleRate/pos;
}
</script>

</body>
</html>
